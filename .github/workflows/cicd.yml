name: build_push_deploy

on:
  push:
    branches: [ "master" ]

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17 with Maven cache
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build Docker Image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:${{ github.sha }} .
          docker tag ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:${{ github.sha }} ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:${{ github.sha }}
          docker push ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            docker rm -f javaapp || true
            docker pull ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest
            docker run -d -p 8080:8080 --name javaapp --restart always ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest
            docker ps
