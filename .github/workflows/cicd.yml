name: build_push_deploy
on:
  push:
    branch: [ "master" ]

jobs:
 build_push_deploy:
  run: ubuntu-latest #github hosted runr

  steps:
  - name: checkout code
    uses: actions/checkout@v3
  - name: setup java
    uses: actions/setup-java@v3 #github action afficaial document
    with:
      distribution: "temurin"
      java-version: "17"
  - name: Build with Maven
    run: mvn -B package #artifact like jar file will genate
  - name: login dockerHub
    uses: docker/login-action@v3
    with:
     username: ${{secrets.DOCKERHUB_USERNAME}}
     password: ${{secrets.DOCKERHUB_TOKEN}}
  - name: Build Docker Image
    run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest .
  - name: push docker image to dockerHub
    run: docker push ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest
  - name: Deploy conatainer to ec2(via SSh)
    uses: appleboy/ssh-action@V1.1.0
    with:
     host: ${{secrets.EC2_HOST}}
     username: ${{secrets.EC2_USER}}
     key: ${{secrets.EC2_SSH_KEY}}

     script: |
      #stop and remove exeisting conatainer
      docker rm -f javaapp || true
      #pull docker image
      docker pull ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest 
      #run the conatainer
      docker run -d -p 8080:8080 --name javaapp ${{secrets.DOCKERHUB_USERNAME}}/java-docker-app:latest
      #show running conatainer
      docker ps
    

