name: Build-Push-Deploy

on:
  push:
    branches:
      - master

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Build Maven project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Debug project structure
      - name: Verify Files
        run: |
          echo "Current Directory:"
          pwd
          echo "Repository Contents:"
          ls -la

      # Verify DockerHub username secret exists
      - name: Verify DockerHub Username
        run: |
          echo "DockerHub Username Length:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}" | wc -c

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest .

      # Push Docker Image
      - name: Push Docker Image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

      # Deploy to EC2
      - name: Deploy Container to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop javaapp || true
            docker rm javaapp || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            docker run -d \
              --name javaapp \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            docker ps
