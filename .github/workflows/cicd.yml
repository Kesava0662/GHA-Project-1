name: Build-Push-Deploy

on:
  push:
    branches:
      - master

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:

      # Checkout Source Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Build Maven Project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Verify Files
      - name: Verify Project Structure
        run: |
          pwd
          ls -la
          echo "DockerHub User: ${{ secrets.DOCKERHUB_USERNAME }}"

      # Login DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest \
            .

      # Push Docker Image
      - name: Push Docker Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

      # Deploy to EC2
      - name: Deploy Container to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Stopping old container..."

            docker stop javaapp || true
            docker rm javaapp || true

            echo "Pulling latest image..."

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            echo "Starting new container..."

            docker run -d \
              --name javaapp \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            docker ps
